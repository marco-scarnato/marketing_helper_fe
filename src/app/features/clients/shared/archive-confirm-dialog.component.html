<h2 mat-dialog-title>Archivia cliente</h2>

<mat-dialog-content>
  Confermi di voler archiviare <strong>{{ data.clientName }}</strong>?
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Annulla</button>
  <button mat-raised-button color="warn" type="button" (click)="confirm()">Archivia</button>
</mat-dialog-actions>
